name: Scribe
options:
  bundleIdPrefix: com.colbylundak
  deploymentTarget:
    iOS: "17.0"
packages:
  Kokoro:
    path: vendor/kokoro-swift

targets:
  Scribe:
    type: application
    platform: iOS
    sources:
      - Scribe
      - path: KokoroAssets
        type: folder
        buildPhase: resources
    dependencies:
      - package: Kokoro
        product: Kokoro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colbylundak.scribe
        CODE_SIGNING_ALLOWED: NO
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
    info:
      path: Scribe/Info.plist
      properties:
        CFBundleDisplayName: Scribe
        UILaunchScreen: {}
        UIAppFonts:
          - SpaceGrotesk-Variable.ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Scribe uses the microphone to capture your voice notes while you read."
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: PDF Document
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
